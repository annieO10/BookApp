<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Pdf Render</title>
    <link rel="stylesheet" href="PdfRender_Styles.css">
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.min.js"></script>
    <script src="PdfRender.js"></script>
</head>
<body>
    <div class="layout">
        
        <div id="sidebar">
            <button id="toggle">☰</button>

            <div class=hidden id="toc">
                <div class="lib-link"><a href="./index.html">Go2Library</a></div>
                <h2 class="toc-content">Table of Context</h2>
            
            </div>
        </div>

        <div class="main-content">
            <div class="controls">
                <button id ="previous" class="previous">&laquo; Previous</button>
                <p id="pageNumber"> </p>
                <input id="InputPageNumber" type="number" placeholder="1">
                <button id="next" class="next">Next &raquo;</button>
            </div>
            <div class="PageSpread">
                <canvas id="canvasLeft"></canvas>
                <canvas id="canvasRight"></canvas>
            </div>
        </div>
        

    </div>
     
   
        
    
    
</body>
</html>
